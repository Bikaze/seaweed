services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seaweed_metadata
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  master:
    image: chrislusf/seaweedfs
    command: "master -ip=master"
    ports:
      - "9333:9333"
    volumes:
      - seaweed_master_data:/data

  volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=master:9333 -port=8080"
    depends_on: [master]
    volumes:
      - seaweed_volume_data:/data

  filer:
    image: chrislusf/seaweedfs
    command: "filer -master=master:9333 -ip=filer -port=8888"
    depends_on: [db, master]
    ports:
      - "8888:8888"
    volumes:
      - ./seaweedfs/filer.toml:/etc/seaweedfs/filer.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "test -S /tmp/seaweedfs-filer-8888.sock"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  s3:
    image: chrislusf/seaweedfs
    command: "s3 -filer=filer:8888 -port=8333 -ip.bind=0.0.0.0 -domainName=localhost"
    depends_on: [filer]
    ports:
      - "8333:8333"
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    healthcheck:
      test: ["CMD-SHELL", "test -S /tmp/seaweedfs-s3-8333.sock"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 15s

  s3-init:
    image: amazon/aws-cli:latest
    depends_on:
      s3:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT_INTERNAL: ${S3_ENDPOINT_INTERNAL}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./cors.json:/work/cors.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        aws --endpoint-url "$S3_ENDPOINT_INTERNAL" s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null || \
        aws --endpoint-url "$S3_ENDPOINT_INTERNAL" s3api create-bucket --bucket "$S3_BUCKET"
        aws --endpoint-url "$S3_ENDPOINT_INTERNAL" s3api put-bucket-cors --bucket "$S3_BUCKET" --cors-configuration file:///work/cors.json
        echo "Applied CORS to bucket $S3_BUCKET"
    restart: "no"

volumes:
  db_data:
  seaweed_master_data:
  seaweed_volume_data:
